<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0066cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="麻醉評估">
    <meta name="description" content="術前麻醉評估檢查清單">
    <title>術前麻醉評估檢查清單</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0066cc;
            --success-color: #00a856;
            --unchecked-bg: #f5f7fa;
            --checked-bg: #e8f5e9;
            --border-color: #ddd;
            --text-dark: #222;
            --text-light: #666;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
            color: var(--text-dark);
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0066cc 0%, #004a99 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .reset-btn, .edit-mode-btn, .save-btn, .cancel-btn {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .edit-mode-btn {
            background: #0066cc;
            color: white;
            flex: 1;
        }

        .reset-btn {
            background: white;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            flex: 1;
        }

        .reset-btn:active, .edit-mode-btn:active {
            transform: scale(0.98);
        }

        .progress-bar {
            flex: 1;
            background: #e0e0e0;
            border-radius: 8px;
            height: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00a856, #2ecc71);
            height: 100%;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 3px;
        }

        .progress-text {
            font-size: 9px;
            color: white;
            font-weight: 600;
        }

        .checklist-container {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            aspect-ratio: 1;
            flex: 1;
            overflow: hidden;
        }

        .checklist-item {
            aspect-ratio: 1;
            background: var(--unchecked-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 6px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .checklist-item:active {
            transform: scale(0.95);
        }

        .checklist-item:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow);
        }

        .checklist-item.checked {
            background: var(--checked-bg);
            border-color: var(--success-color);
            box-shadow: 0 4px 12px rgba(0, 168, 86, 0.2);
        }

        .item-icon {
            font-size: 20px;
            margin-bottom: 3px;
            line-height: 1;
        }

        .item-text {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .checklist-item.checked .item-text {
            color: var(--success-color);
            font-weight: 600;
        }

        .summary {
            padding: 12px 16px;
            background: #f9f9f9;
            border-top: 1px solid var(--border-color);
            text-align: center;
            flex-shrink: 0;
        }

        .summary-text {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .summary-count {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .complete-badge {
            display: inline-block;
            background: var(--success-color);
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }

        .edit-panel {
            display: none;
            flex-direction: column;
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .edit-mode .checklist-container,
        .edit-mode .summary,
        .edit-mode .reset-btn {
            display: none;
        }

        .edit-mode .edit-panel {
            display: flex;
        }

        .edit-mode .progress-bar {
            display: none;
        }

        .add-item-btn {
            background: #00a856;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            margin-bottom: 12px;
        }

        .edit-item {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .edit-item input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 14px;
            font-family: inherit;
        }

        .edit-item-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 10px;
            cursor: pointer;
            font-weight: 600;
            min-width: 40px;
        }

        .edit-controls {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .save-btn, .cancel-btn {
            flex: 1;
        }

        .save-btn {
            background: #00a856;
            color: white;
        }

        .cancel-btn {
            background: white;
            border: 2px solid #ddd;
            color: #666;
        }

        .edit-controls {
            display: none;
        }

        .edit-mode .edit-controls {
            display: flex;
        }

        .edit-mode .button-group {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 術前麻醉評估</h1>
            <p>檢查清單</p>
        </div>

        <div class="button-group">
            <button class="reset-btn" id="resetBtn">🔄 重置</button>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">
                    <span class="progress-text" id="progressText">0%</span>
                </div>
            </div>
            <button class="edit-mode-btn" id="editModeBtn">✏️ 編輯</button>
        </div>

        <div class="edit-controls" id="editControls">
            <button class="save-btn" id="saveBtn">保存 ✓</button>
            <button class="cancel-btn" id="cancelBtn">取消</button>
        </div>

        <div class="checklist-container" id="checklistContainer"></div>

        <div class="edit-panel" id="editPanel">
            <button class="add-item-btn" id="addItemBtn">➕ 新增項目</button>
            <div id="editItemsContainer"></div>
        </div>

        <div class="summary" id="summary">
            <div class="summary-text">完成進度</div>
            <div class="summary-count"><span id="completedCount">0</span> / <span id="totalCount">0</span></div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('ServiceWorker registration failed:', err);
            });
        }

        const DEFAULT_ITEMS = [
            { icon: '👤', label: '確認病人身分' },
            { icon: '📋', label: '手術診斷' },
            { icon: '🔪', label: '手術術式' },
            { icon: '📜', label: '過去病史' },
            { icon: '💓', label: '術前生命徵象' },
            { icon: '🩸', label: '血液檢查(CBC, BCS)' },
            { icon: '🧪', label: '凝血功能檢查' },
            { icon: '🖼️', label: '影像檢查' },
            { icon: '❤️', label: '心臟超音波' },
            { icon: '💨', label: '肺功能檢查' },
            { icon: '📢', label: '向主治醫師報備' },
        ];

        const checklistContainer = document.getElementById('checklistContainer');
        const resetBtn = document.getElementById('resetBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const completedCount = document.getElementById('completedCount');
        const totalCount = document.getElementById('totalCount');
        const summary = document.getElementById('summary');
        const editModeBtn = document.getElementById('editModeBtn');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const editPanel = document.getElementById('editPanel');
        const editItemsContainer = document.getElementById('editItemsContainer');
        const addItemBtn = document.getElementById('addItemBtn');
        const container = document.querySelector('.container');

        let items = [];
        let checkedItems = new Set();
        let isEditMode = false;

        function loadConfig() {
            const saved = localStorage.getItem('checklist-items');
            if (saved) {
                try {
                    items = JSON.parse(saved);
                } catch (e) {
                    items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
                }
            } else {
                items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
            }
        }

        function saveConfig() {
            localStorage.setItem('checklist-items', JSON.stringify(items));
        }

        function loadState() {
            const saved = localStorage.getItem('checklist-state');
            if (saved) {
                checkedItems = new Set(JSON.parse(saved));
            }
        }

        function saveState() {
            localStorage.setItem('checklist-state', JSON.stringify(Array.from(checkedItems)));
        }

        function toggleEditMode(enter) {
            isEditMode = enter;
            container.classList.toggle('edit-mode', isEditMode);

            if (isEditMode) {
                renderEditPanel();
            } else {
                init();
            }
        }

        function renderEditPanel() {
            editItemsContainer.innerHTML = '';
            items.forEach((item, index) => {
                const editItem = document.createElement('div');
                editItem.className = 'edit-item';
                editItem.innerHTML = `
                    <input type="text" class="icon-input" value="${item.icon}" maxlength="2" style="width: 50px;">
                    <input type="text" class="label-input" value="${item.label}">
                    <button class="edit-item-remove" data-index="${index}">删除</button>
                `;

                const removeBtn = editItem.querySelector('.edit-item-remove');
                removeBtn.addEventListener('click', () => {
                    items.splice(index, 1);
                    renderEditPanel();
                });

                const iconInput = editItem.querySelector('.icon-input');
                const labelInput = editItem.querySelector('.label-input');

                iconInput.addEventListener('change', (e) => {
                    items[index].icon = e.target.value || '•';
                });

                labelInput.addEventListener('change', (e) => {
                    items[index].label = e.target.value;
                });

                editItemsContainer.appendChild(editItem);
            });
        }

        addItemBtn.addEventListener('click', () => {
            items.push({ icon: '✓', label: '新項目' });
            renderEditPanel();
        });

        function init() {
            checklistContainer.innerHTML = '';
            totalCount.textContent = items.length;

            items.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = 'checklist-item';
                if (checkedItems.has(index)) {
                    itemElement.classList.add('checked');
                }
                itemElement.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-text">${item.label}</div>
                `;

                itemElement.addEventListener('click', () => toggleItem(index, itemElement));
                checklistContainer.appendChild(itemElement);
            });

            updateProgress();
        }

        function toggleItem(index, element) {
            if (checkedItems.has(index)) {
                checkedItems.delete(index);
                element.classList.remove('checked');
            } else {
                checkedItems.add(index);
                element.classList.add('checked');
                playCheckSound();
            }
            updateProgress();
            saveState();
        }

        function updateProgress() {
            const completed = checkedItems.size;
            const total = items.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            completedCount.textContent = completed;
            progressFill.style.width = percentage + '%';
            progressText.textContent = percentage + '%';

            if (completed === total && total > 0) {
                showCompleteMessage();
            } else {
                removeCompleteMessage();
            }
        }

        function showCompleteMessage() {
            if (!document.getElementById('completeBadge')) {
                const badge = document.createElement('div');
                badge.id = 'completeBadge';
                badge.className = 'complete-badge';
                badge.textContent = '✓ 所有項目已完成！';
                summary.appendChild(badge);
            }
        }

        function removeCompleteMessage() {
            const badge = document.getElementById('completeBadge');
            if (badge) {
                badge.remove();
            }
        }

        function playCheckSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();

                oscillator.connect(gain);
                gain.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                // Browser doesn't support Web Audio API
            }
        }

        editModeBtn.addEventListener('click', () => {
            toggleEditMode(true);
        });

        saveBtn.addEventListener('click', () => {
            saveConfig();
            toggleEditMode(false);
        });

        cancelBtn.addEventListener('click', () => {
            loadConfig();
            toggleEditMode(false);
        });

        resetBtn.addEventListener('click', () => {
            checkedItems.clear();
            document.querySelectorAll('.checklist-item').forEach(item => {
                item.classList.remove('checked');
            });
            updateProgress();
            saveState();
        });

        loadConfig();
        loadState();
        init();
    </script>
</body>
</html>
